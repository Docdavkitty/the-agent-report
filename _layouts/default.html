<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/fonts.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/images/favicon.svg' | relative_url }}">
  {% feed_meta %}
  {% seo %}
  <!-- Per-article OG image override -->
  {% assign og_img = page.hero_image | default: '/assets/images/og-image.png' %}
  <meta property="og:image" content="{{ og_img | absolute_url }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:type" content="{% if page.date %}article{% else %}website{% endif %}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="{{ og_img | absolute_url }}">
  <!-- Plausible Analytics — replace data-domain with your domain -->
  <script defer data-domain="docdavkitty.github.io/the-agent-report" src="https://plausible.io/js/script.js"></script>
</head>
<body>
  {% include header.html %}
  <main class="main-content">
    {{ content }}
  </main>
  {% include footer.html %}
  <script>
    // Theme toggle
    (function() {
      const stored = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = stored || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);

      document.addEventListener('DOMContentLoaded', function() {
        const btn = document.getElementById('theme-toggle');
        if (!btn) return;
        btn.textContent = theme === 'dark' ? '☀️' : '🌙';
        btn.addEventListener('click', function() {
          const current = document.documentElement.getAttribute('data-theme');
          const next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
          btn.textContent = next === 'dark' ? '☀️' : '🌙';
        });
      });
    })();
  </script>
</body>
</html>
