<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">

  <!-- Critical CSS (above-the-fold) -->
  <style>
    :root {
      --bg: #0f0f13; --bg-card: #18181e; --bg-hover: #1e1e26;
      --text: #e8e8ed; --text-muted: #888899; --text-dim: #5c5c6e;
      --accent: #6c5ce7; --accent-light: #a29bfe;
      --accent-green: #00cec9; --accent-orange: #fdcb6e;
      --accent-pink: #e84393; --accent-blue: #74b9ff;
      --border: #2a2a35; --border-light: #333344;
      --radius: 12px; --radius-sm: 8px;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --max-width: 1200px; --card-shadow: 0 8px 25px rgba(0,0,0,.3);
    }
    [data-theme="light"] {
      --bg: #f5f5f7; --bg-card: #ffffff; --bg-hover: #f0f0f2;
      --text: #1a1a2e; --text-muted: #555566; --text-dim: #888899;
      --accent: #6c5ce7; --accent-light: #6c5ce7;
      --accent-green: #00b894; --accent-orange: #e17055;
      --accent-pink: #e84393; --accent-blue: #0984e3;
      --border: #d4d4dc; --border-light: #e0e0e6;
      --card-shadow: 0 8px 25px rgba(0,0,0,.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-sans); background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }
    a { color: var(--accent-light); text-decoration: none; }
    img { max-width: 100%; height: auto; border-radius: var(--radius-sm); }
    .main-content { max-width: var(--max-width); margin: 0 auto; padding: 0 20px; }
    .site-header { border-bottom: 1px solid var(--border); background: rgba(15,15,19,.9); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: var(--max-width); margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .site-logo { display: flex; align-items: center; color: var(--text); font-size: 1.3rem; font-weight: 800; letter-spacing: -.5px; }
    .site-logo img { max-height: 36px; width: auto; display: block; }
    .site-nav { display: flex; gap: 28px; }
    .nav-link { color: var(--text-muted); font-size: .9rem; font-weight: 500; position: relative; }
  </style>

  <!-- Async CSS -->
  <link rel="preload" href="{{ '/assets/fonts/Inter-Variable.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="{{ '/assets/fonts/JetBrainsMono-Variable.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="{{ '/assets/css/fonts.css' | relative_url }}" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="{{ '/assets/css/fonts.css' | relative_url }}"><link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}"></noscript>
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/images/favicon.svg' | relative_url }}">
  {% feed_meta %}
  {% seo %}
  <meta name="twitter:card" content="summary_large_image">
  <!-- Per-article OG image override -->
  {% assign og_img = page.hero_image | default: '/assets/images/og-image.png' %}
  <meta property="og:image" content="{{ og_img | absolute_url }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:type" content="{% if page.date %}article{% else %}website{% endif %}">
  <meta name="twitter:image" content="{{ og_img | absolute_url }}">
  <!-- GoatCounter analytics -->
  <script data-goatcounter="https://agent-report.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
  <!-- Cloudflare Web Analytics -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "b9fc2f8ccc4e4551832f6296471b264c"}'></script>

  <!-- JSON-LD: WebSite (Sitelinks Search Box) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "The Agent Report",
    "url": "{{ '/' | absolute_url }}",
    "description": "{{ site.description | strip_html | strip_newlines | escape }}",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "{{ '/search/' | absolute_url }}?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- JSON-LD: Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "The Agent Report",
    "url": "{{ '/' | absolute_url }}",
    "logo": "{{ '/assets/images/logo.svg' | absolute_url }}",
    "description": "{{ site.description | strip_html | strip_newlines | escape }}",
    "sameAs": [
      "https://github.com/Docdavkitty/the-agent-report",
      "https://x.com/TheAgentReport"
    ]
  }
  </script>
</head>
<body>
  {% include header.html %}
  <main class="main-content">
    {{ content }}
  </main>
  {% include footer.html %}

  <!-- Back to Top -->
  <button id="back-to-top" class="back-to-top" aria-label="Back to top">↑</button>

  <script>
    // Theme toggle
    (function() {
      const stored = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = stored || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);

      document.addEventListener('DOMContentLoaded', function() {
        const btn = document.getElementById('theme-toggle');
        if (!btn) return;
        btn.textContent = theme === 'dark' ? '☀️' : '🌙';
        btn.addEventListener('click', function() {
          const current = document.documentElement.getAttribute('data-theme');
          const next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
          btn.textContent = next === 'dark' ? '☀️' : '🌙';
        });
      });
    })();
  </script>

  <!-- Back to Top JS -->
  <script>
    (function() {
      var btn = document.getElementById('back-to-top');
      if (!btn) return;
      function toggle() {
        if (window.scrollY > 400) {
          btn.classList.add('visible');
        } else {
          btn.classList.remove('visible');
        }
      }
      window.addEventListener('scroll', toggle, { passive: true });
      toggle();
      btn.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    })();
  </script>
</body>
</html>
