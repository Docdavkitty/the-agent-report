<header class="site-header">
  <div class="header-inner">
    <a href="{{ '/' | relative_url }}" class="site-logo">
      <span class="logo-group">
        <span class="logo-icon">T</span>
        <span>The <span class="gradient-text">Agent</span> Report</span>
      </span>
    </a>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">Home</a>
      <a href="{{ '/latest/' | relative_url }}" class="nav-link">Latest</a>
      <a href="{{ '/categories/research/' | relative_url }}" class="nav-link">Research</a>
      <a href="{{ '/categories/tools-frameworks/' | relative_url }}" class="nav-link">Tools</a>
      <a href="{{ '/categories/industry/' | relative_url }}" class="nav-link">Industry</a>
      <a href="{{ '/categories/opinion/' | relative_url }}" class="nav-link">Opinion</a>
      <a href="{{ '/about/' | relative_url }}" class="nav-link">About</a>
      <a href="{{ '/search/' | relative_url }}" class="nav-link search-btn" style="display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);font-size:.8rem;">
        🔍 <span>Search</span>
      </a>
    </nav>
    <div class="header-actions">
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">☀️</button>
      <button class="menu-toggle" aria-label="Toggle menu">☰</button>
    </div>
  </div>
</header>
<script>
  document.querySelector('.menu-toggle')?.addEventListener('click', function() {
    document.querySelector('.site-nav').classList.toggle('open');
  });
</script>
